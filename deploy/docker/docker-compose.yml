# Example Watchtower deployment.
#
# Watchtower talks to the host Docker daemon to inspect containers and run `docker compose`
# for your stacks, so it needs the Docker socket mounted and permission to use it.
#
#   1. Find the host's docker group GID:  getent group docker | cut -d: -f3
#   2. Put that value in `group_add` below.
#   3. docker compose up -d
#
# The UI is served on http://localhost:8080. Put it behind an authenticating reverse proxy
# (e.g. Cloudflare Access, Authelia) — Watchtower itself has no built-in authentication.
#
# Built-in reverse proxy (optional): set WATCHTOWER__PROXY__ENABLED=true and Watchtower manages a
# Caddy container itself (over the Docker socket) that publishes host ports 80/443, terminates TLS
# with automatic certificates, and routes the domains you add under "Routes" to services inside your
# stacks over a private edge network. Requirements when enabled:
#   * host ports 80 and 443 must be free (don't run another proxy on them),
#   * set WATCHTOWER__PROXY__ADMINEMAIL for Let's Encrypt expiry notices (recommended).
# Watchtower creates the caddy_data / caddy_config volumes and the proxy networks automatically —
# no changes to this file are needed. Leave the flag unset to run your own proxy instead.
services:
  watchtower:
    image: swimmes/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - watchtower-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      # Optional: expose the host's docker credentials for private image pulls.
      # - ${HOME}/.docker/config.json:/home/watchtower/.docker/config.json:ro
      # Optional: host CPU/RAM/load on the Dashboard (opt-in) — see docs/host-metrics.md.
      # - /proc:/host/proc:ro
    environment:
      WATCHTOWER__DBPATH: /data/watchtower.db
      WATCHTOWER__DOCKERAPIVERSION: "1.43"
      # Enable the background "update available" checkers (opt-in — generate registry traffic):
      # WATCHTOWER__AUTOCHECKENABLED: "true"
      # WATCHTOWER__STACKCHECKENABLED: "true"
      # Built-in Caddy reverse proxy (opt-in) — see the header comment. Needs host ports 80/443 free.
      # WATCHTOWER__PROXY__ENABLED: "true"
      # WATCHTOWER__PROXY__ADMINEMAIL: you@example.com
      # Host metrics (opt-in) — needs the /proc mount above; see docs/host-metrics.md.
      # WATCHTOWER_HOST_PROC: /host/proc
    # Replace 999 with the host's docker group GID (see the header comment).
    group_add:
      - "999"

volumes:
  watchtower-data:
