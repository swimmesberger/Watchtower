name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      # ── Backend ──
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Build backend
        run: dotnet build Watchtower.slnx --configuration Release

      - name: Verify RPC schema is up to date
        run: |
          dotnet run --project src/Watchtower.Api --configuration Release --no-build -- --export-schema rpc-schema.json
          git diff --exit-code -- rpc-schema.json \
            || (echo "::error::rpc-schema.json is stale. Run: dotnet run --project src/Watchtower.Api -- --export-schema rpc-schema.json" && exit 1)

      # ── Frontend ──
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/watchtower-web/package-lock.json

      - name: Build frontend
        working-directory: src/watchtower-web
        run: |
          npm ci
          npm run build

  docker:
    name: Build & push image
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/watchtower:latest
            ${{ vars.DOCKERHUB_USERNAME }}/watchtower:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
